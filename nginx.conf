# hathichinh.com — Next.js Reverse Proxy
# Port: 3100

# HTTP server (fallback / redirect)
server {
    listen 80;
    server_name hathichinh.com www.hathichinh.com;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Override Next.js s-maxage for Cloudflare
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=0, s-maxage=60, stale-while-revalidate=300";
    }
}

# HTTPS server (Cloudflare Full SSL connects here)
server {
    listen 443 ssl http2;
    server_name hathichinh.com www.hathichinh.com;

    # Self-signed cert (Cloudflare handles real SSL to users)
    ssl_certificate /etc/nginx/ssl/hathichinh.crt;
    ssl_certificate_key /etc/nginx/ssl/hathichinh.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Static files caching (immutable hashed assets)
    location /_next/static {
        proxy_pass http://127.0.0.1:3100;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Image/media files - moderate cache
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
        proxy_pass http://127.0.0.1:3100;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=3600";
    }

    # Next.js reverse proxy
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Override Next.js s-maxage for Cloudflare
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=0, s-maxage=60, stale-while-revalidate=300";
    }
}
